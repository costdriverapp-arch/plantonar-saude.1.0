kind = "mobile"
previewPath = "/"
title = "Plantonar Saúde"
version = "1.0.0"
id = "artifacts/plantonar-saude"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 18652

[services.development]
run = "pnpm --filter @workspace/plantonar-saude run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plantonar-saude", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/plantonar-saude", "run", "serve" ]

[services.env]
PORT = "18652"
BASE_PATH = "/"
